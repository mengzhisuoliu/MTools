name: Build and Release

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      release:
        description: '是否创建 Release'
        required: false
        default: false
        type: boolean
  
  # 推送标签时自动触发（会创建 Release）
  push:
    tags:
      - 'v*'
    # 推送主分支时也触发（只构建，不发布）
    branches:
      - main

# 确保同一时间只运行一个工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  FLET_CLI_NO_RICH_OUTPUT: 1
  PYTHONUTF8: 1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 标准版（DirectML）
          - os: windows-latest
            platform: Windows
            flet_platform: windows
            arch: amd64
            artifact_ext: .zip
            cuda_variant: none
          # Windows CUDA 版（需要额外安装 CUDA）
          - os: windows-latest
            platform: Windows
            flet_platform: windows
            arch: amd64
            artifact_ext: .zip
            cuda_variant: cuda
          # Windows CUDA Full 版（内置 CUDA 和 cuDNN）
          - os: windows-latest
            platform: Windows
            flet_platform: windows
            arch: amd64
            artifact_ext: .zip
            cuda_variant: cuda_full
          # macOS (Apple Silicon)
          - os: macos-latest
            platform: Darwin
            flet_platform: macos
            arch: arm64
            artifact_ext: .tar.gz
            cuda_variant: none
          # macOS (Intel) 镜像有问题，暂时禁用
          # - os: macos-15
          #   platform: Darwin
          #   flet_platform: macos
          #   arch: amd64
          #   artifact_ext: .tar.gz
          #   cuda_variant: none
          # Linux 标准版（CPU）
          - os: ubuntu-22.04
            platform: Linux
            flet_platform: linux
            arch: amd64
            artifact_ext: .tar.gz
            cuda_variant: none
          # Linux CUDA 版（需要额外安装 CUDA）
          - os: ubuntu-22.04
            platform: Linux
            flet_platform: linux
            arch: amd64
            artifact_ext: .tar.gz
            cuda_variant: cuda

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ========== 平台依赖安装 ==========

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          # Rosetta 2（Apple Silicon 上运行 x86_64 代码需要）
          sudo softwareupdate --install-rosetta --agree-to-license || true
          # CocoaPods（Flet macOS 构建需要）
          gem install cocoapods || true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      # Windows 无需额外安装（Visual Studio 已预装）

      # ========== 安装 flet-cli ==========

      - name: Install flet-cli
        run: |
          python -m pip install --upgrade pip
          pip install flet-cli==0.84.0

      # ========== CUDA 变体处理 ==========

      - name: Prepare CUDA variant
        if: matrix.cuda_variant != 'none'
        run: python scripts/prepare_cuda_variant.py ${{ matrix.cuda_variant }}

      - name: Write CUDA variant to config
        if: matrix.cuda_variant == 'none'
        run: python scripts/prepare_cuda_variant.py none

      # ========== 获取版本号 ==========

      - name: Get version from app_config.py
        id: version
        shell: python
        run: |
          import os
          import re
          
          with open('src/constants/app_config.py', 'r', encoding='utf-8') as f:
              content = f.read()
          
          match = re.search(r'APP_VERSION.*?["\'](.+?)["\']', content)
          version = match.group(1) if match else '0.0.0'
          
          # 提取纯数字版本（用于 build-version）
          clean_version = re.split(r'[-+]', version)[0]
          # 确保是 x.y.z 格式
          parts = clean_version.split('.')
          while len(parts) < 3:
              parts.append('0')
          build_version = '.'.join(parts[:3])
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')
              f.write(f'build_version={build_version}\n')
          
          print(f'Version: {version}')
          print(f'Build Version: {build_version}')

      # ========== Flet Build ==========

      # 移除平台专用图标，强制 flet build 使用高分辨率 icon.png (1024x1024)
      # flutter_launcher_icons 从 PNG 生成各平台所需的全部尺寸，效果最佳
      - name: Remove platform-specific icon files
        shell: bash
        run: rm -f src/assets/icon.icns src/assets/icon.ico

      - name: Build with Flet
        run: |
          python flet_build.py ${{ matrix.flet_platform }} --verbose --no-rich-output --yes --build-version=${{ steps.version.outputs.build_version }} --build-number=${{ github.run_number }}
      
      - name: Bundle pywin32 runtime files (Windows)
        if: runner.os == 'Windows'
        shell: python
        run: |
          import site
          import shutil
          import subprocess
          from pathlib import Path
          
          build_root = Path("build/windows")
          if not build_root.exists():
              raise SystemExit("build/windows not found")
          
          site_packages_targets = [p for p in build_root.rglob("site-packages") if (p / "pythoncom.py").exists()]
          if not site_packages_targets:
              raise SystemExit("No target site-packages with pythoncom.py found in build output")
          
          target_sp = site_packages_targets[0]
          print(f"Target site-packages: {target_sp}")
          
          candidate_dirs = []
          
          # 1) 优先从构建产物内部查找（最可靠）
          target_pywin32 = target_sp / "pywin32_system32"
          if target_pywin32.exists():
              candidate_dirs.append(target_pywin32)
          
          # 2) 其次从构建目录其他位置查找
          for p in build_root.rglob("pywin32_system32"):
              if p.exists() and p not in candidate_dirs:
                  candidate_dirs.append(p)
          
          # 3) 再尝试从 runner Python 环境查找
          for p in site.getsitepackages() + [site.getusersitepackages()]:
              pywin32_dir = Path(p) / "pywin32_system32"
              if pywin32_dir.exists() and pywin32_dir not in candidate_dirs:
                  candidate_dirs.append(pywin32_dir)
          
          # 4) 如果还没有，动态安装 pywin32 再查一次
          if not candidate_dirs:
              print("pywin32_system32 not found, installing pywin32...")
              subprocess.check_call(["python", "-m", "pip", "install", "pywin32>=311"])
              for p in site.getsitepackages() + [site.getusersitepackages()]:
                  pywin32_dir = Path(p) / "pywin32_system32"
                  if pywin32_dir.exists() and pywin32_dir not in candidate_dirs:
                      candidate_dirs.append(pywin32_dir)
          
          copied = []
          for src_dir in candidate_dirs:
              for pattern in ("pywintypes*.dll", "pythoncom*.dll"):
                  for src in src_dir.glob(pattern):
                      dst = target_sp / src.name
                      shutil.copy2(src, dst)
                      copied.append(dst.name)
          
          if not copied:
              print("WARNING: No pywin32 runtime DLLs copied. Build will continue.")
              raise SystemExit(0)
          
          print("Copied pywin32 runtime files:")
          for name in sorted(set(copied)):
              print(f" - {name}")
      
      - name: Normalize executable name casing (Windows)
        if: runner.os == 'Windows'
        shell: python
        run: |
          from pathlib import Path
          
          build_root = Path("build/windows")
          candidates = list(build_root.rglob("mtools.exe"))
          if not candidates:
              print("No mtools.exe found, skip")
              raise SystemExit(0)
          
          for src in candidates:
              dst = src.with_name("MTools.exe")
              # Windows 文件系统通常大小写不敏感，需要中间名
              tmp = src.with_name("mtools_tmp.exe")
              src.rename(tmp)
              tmp.rename(dst)
              print(f"Renamed: {src} -> {dst}")

      # ========== 解决 sherpa_onnx 与 onnxruntime-gpu 的 DLL 冲突 ==========
      # sherpa_onnx 自带 onnxruntime.dll (v1.23.2)，会与 onnxruntime-gpu (v1.24.4) 冲突
      # 删掉 sherpa_onnx 自带的 onnxruntime DLLs，强制使用 onnxruntime-gpu 的版本
      # onnxruntime-gpu 已有完整的 CUDA provider 支持

      - name: Remove sherpa_onnx bundled onnxruntime (Windows)
        if: matrix.cuda_variant != 'none' && runner.os == 'Windows'
        shell: python
        run: |
          from pathlib import Path

          build_root = Path("build/windows")
          for sp in build_root.rglob("site-packages"):
              sherpa_lib = sp / "sherpa_onnx" / "lib"
              if not sherpa_lib.is_dir():
                  continue
              removed = []
              for name in ["onnxruntime.dll", "onnxruntime_providers_cuda.dll",
                           "onnxruntime_providers_shared.dll", "onnxruntime_providers_tensorrt.dll"]:
                  f = sherpa_lib / name
                  if f.exists():
                      f.unlink()
                      removed.append(name)
              if removed:
                  print(f"Removed from {sherpa_lib}: {removed}")
              remaining = [f.name for f in sherpa_lib.iterdir() if f.suffix == '.dll']
              print(f"Remaining in sherpa_onnx/lib: {remaining}")

      - name: Remove sherpa_onnx bundled onnxruntime (Linux)
        if: matrix.cuda_variant != 'none' && runner.os == 'Linux'
        shell: python
        run: |
          from pathlib import Path

          build_root = Path("build/linux")
          for sp in build_root.rglob("site-packages"):
              sherpa_lib = sp / "sherpa_onnx" / "lib"
              if not sherpa_lib.is_dir():
                  continue
              removed = []
              for pattern in ["onnxruntime.so*", "onnxruntime_providers_cuda.so*",
                              "onnxruntime_providers_shared.so*", "onnxruntime_providers_tensorrt.so*",
                              "libonnxruntime.so*", "libonnxruntime_providers_cuda.so*",
                              "libonnxruntime_providers_shared.so*"]:
                  for f in sherpa_lib.glob(pattern):
                      f.unlink()
                      removed.append(f.name)
              if removed:
                  print(f"Removed from {sherpa_lib}: {removed}")
              remaining = [f.name for f in sherpa_lib.iterdir() if f.suffix in ('.so', '.dll')]
              print(f"Remaining in sherpa_onnx/lib: {remaining}")

      # cuda_full 版本：复制 CUDA 运行时 DLL 到 onnxruntime/capi/ 确保打包后也能加载
      - name: Copy CUDA DLLs to onnxruntime capi (Windows cuda_full)
        if: matrix.cuda_variant == 'cuda_full' && runner.os == 'Windows'
        shell: python
        run: |
          from pathlib import Path
          import shutil

          build_root = Path("build/windows")
          sp_dirs = [sp for sp in build_root.rglob("site-packages") if (sp / "nvidia").is_dir()]
          if not sp_dirs:
              print("No site-packages with nvidia found, skip")
              raise SystemExit(0)

          sp = sp_dirs[0]
          capi = sp / "onnxruntime" / "capi"
          if not capi.is_dir():
              print("onnxruntime/capi not found, skip")
              raise SystemExit(0)

          cuda_dlls = list((sp / "nvidia").rglob("*.dll"))
          print(f"Found {len(cuda_dlls)} CUDA DLLs in nvidia/")

          copied = 0
          for dll in cuda_dlls:
              dest = capi / dll.name
              if not dest.exists():
                  shutil.copy2(dll, dest)
                  copied += 1
          print(f"Copied {copied} DLLs to {capi.relative_to(build_root)}")

          # 删除 nvidia/ 目录，DLL 已复制到 onnxruntime/capi/，不再需要
          nvidia_dir = sp / "nvidia"
          if nvidia_dir.is_dir():
              shutil.rmtree(nvidia_dir)
              print("Removed nvidia/ directory to avoid duplication")

      # cudnn 依赖 zlibwapi.dll，NVIDIA Python 包不包含此文件，需要单独下载
      - name: Download zlibwapi.dll (Windows cuda_full)
        if: matrix.cuda_variant == 'cuda_full' && runner.os == 'Windows'
        shell: python
        run: |
          from pathlib import Path
          import urllib.request, zipfile, shutil

          build_root = Path("build/windows")
          capi_dirs = [p / "onnxruntime" / "capi" for p in build_root.rglob("site-packages") if (p / "onnxruntime" / "capi").is_dir()]
          if not capi_dirs:
              print("onnxruntime/capi not found, skip")
              raise SystemExit(0)

          capi = capi_dirs[0]
          if (capi / "zlibwapi.dll").exists():
              print("zlibwapi.dll already exists, skip")
              raise SystemExit(0)

          url = "http://www.winimage.com/zLibDll/zlib123dllx64.zip"
          zip_path = Path("zlibwapi_temp.zip")
          print(f"Downloading {url}...")
          urllib.request.urlretrieve(url, zip_path)

          with zipfile.ZipFile(zip_path) as z:
              for name in z.namelist():
                  if name.endswith("zlibwapi.dll"):
                      z.extract(name, "zlibwapi_temp")
                      src = Path("zlibwapi_temp") / name
                      shutil.copy2(src, capi / "zlibwapi.dll")
                      print(f"Copied zlibwapi.dll to {capi.relative_to(build_root)}")
                      break

          zip_path.unlink(missing_ok=True)
          shutil.rmtree("zlibwapi_temp", ignore_errors=True)

      # ========== 验证 CUDA DLLs ==========

      - name: Verify CUDA libraries in build output
        if: matrix.cuda_variant != 'none'
        shell: python
        run: |
          from pathlib import Path
          import sys

          platform = "${{ matrix.flet_platform }}"
          build_root = Path(f"build/{platform}")
          if not build_root.exists():
              print(f"WARNING: build/{platform} not found")
              sys.exit(0)

          # 查找主 site-packages（包含 onnxruntime 的那个）
          sp_dirs = list(build_root.rglob("site-packages"))
          print(f"Found {len(sp_dirs)} site-packages dir(s)")

          main_sp = None
          for sp in sp_dirs:
              if (sp / "onnxruntime").exists() or (sp / "nvidia").exists():
                  main_sp = sp
                  break

          if main_sp is None:
              print("WARNING: No site-packages with onnxruntime/nvidia found")
              for sp in sp_dirs:
                  print(f"  {sp}")
              sys.exit(0)

          print(f"\nMain site-packages: {main_sp}")

          # onnxruntime capi
          capi = main_sp / "onnxruntime" / "capi"
          if capi.exists():
              dlls = [f.name for f in capi.iterdir() if f.suffix in ('.dll', '.so', '.pyd', '.dylib')]
              print(f"\nonnxruntime/capi/ ({len(dlls)} binaries):")
              for d in sorted(dlls):
                  print(f"  {d}")
              if any('cuda' in d.lower() for d in dlls):
                  print("  ✓ CUDA providers found")
              else:
                  print("  ✗ WARNING: No CUDA provider DLLs")

          # sherpa_onnx lib
          sherpa_lib = main_sp / "sherpa_onnx" / "lib"
          if sherpa_lib.exists():
              dlls = [f.name for f in sherpa_lib.iterdir() if f.suffix in ('.dll', '.so', '.pyd', '.dylib')]
              print(f"\nsherpa_onnx/lib/ ({len(dlls)} binaries):")
              for d in sorted(dlls):
                  print(f"  {d}")

          # nvidia packages
          nvidia_dir = main_sp / "nvidia"
          if nvidia_dir.exists():
              print(f"\nnvidia/ subdirectories:")
              for sub in sorted(nvidia_dir.iterdir()):
                  if sub.is_dir():
                      for dname in ("bin", "lib"):
                          d = sub / dname
                          if d.exists():
                              files = [f.name for f in d.iterdir() if f.is_file()]
                              if files:
                                  print(f"  {sub.name}/{dname}/ ({len(files)} files): {files[:5]}{'...' if len(files) > 5 else ''}")
              print("  ✓ nvidia CUDA libraries found")
          else:
              variant = "${{ matrix.cuda_variant }}"
              if variant == "cuda_full":
                  print("\n✗ ERROR: nvidia/ not found in cuda_full build!")
                  sys.exit(1)
              else:
                  print("\nnvidia/ not found (expected for cuda variant)")

      # ========== 打包产物 ==========

      - name: Get artifact name
        id: artifact
        shell: bash
        run: |
          CUDA_SUFFIX=""
          if [ "${{ matrix.cuda_variant }}" == "cuda" ]; then
            CUDA_SUFFIX="_CUDA"
          elif [ "${{ matrix.cuda_variant }}" == "cuda_full" ]; then
            CUDA_SUFFIX="_CUDA_FULL"
          fi
          
          ARTIFACT_NAME="MTools_${{ matrix.platform }}_${{ matrix.arch }}${CUDA_SUFFIX}"
          echo "name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "Artifact name: ${ARTIFACT_NAME}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd build/windows
          7z a "../../${{ steps.artifact.outputs.name }}.zip" .
          echo "Packaged Windows artifact"

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/macos
          tar -czf "../../${{ steps.artifact.outputs.name }}.tar.gz" .
          echo "Packaged macOS artifact"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/linux
          tar -czf "../../${{ steps.artifact.outputs.name }}.tar.gz" .
          echo "Packaged Linux artifact"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}${{ matrix.artifact_ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    # 只在推送标签或手动触发且选择创建 Release 时运行
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release)
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from app_config.py
        id: version
        shell: python
        run: |
          import os
          import re
          
          with open('src/constants/app_config.py', 'r', encoding='utf-8') as f:
              content = f.read()
          
          match = re.search(r'APP_VERSION.*?["\'](.+?)["\']', content)
          version = match.group(1) if match else '0.0.0'
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -laR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: MTools v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
